<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>
body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg,#833ab4,#fd1d1d,#fcb045);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    width:320px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

.container h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:14px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#0095f6;
    border:none;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#007ad9;
}

.login{
    margin-top:15px;
    font-size:14px;
}

.login a{
    text-decoration:none;
    color:#0095f6;
}
</style>

</head>

<body>

<div class="container">
<h2>Sign Up</h2>

<form>
<input type="text" placeholder="Username" required>
<input type="email" placeholder="Email" required>
<input type="password" placeholder="Password" required>
<input type="password" placeholder="Confirm Password" required>

<button type="submit">Register</button>
</form>

<div class="login">
Already have an account? <a href="#">Login</a>
</div>

</div>

</body>
</html>
